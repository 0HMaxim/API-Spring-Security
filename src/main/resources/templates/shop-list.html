<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
                                        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Shop List</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div style="display: flex; justify-content: space-between">
    <h1>Shop List</h1>


    <h1 th:each="authority : ${authorities}" th:text="${authority.authority}" > </h1>

    <form action="/logout" method="post" style="display:inline;">
        <button type="submit">Logout</button>
    </form>

</div>



<div th:if="${errorMessage}">
    <p th:text="${errorMessage}"></p>
</div>


<form th:action="@{/shops/search}" method="get">
    <input type="text" name="query" placeholder="Search by name, category or address">
    <button type="submit">Search</button>
</form>


<table>
    <thead>
    <tr>
        <th><a th:href="@{/shops(page=${currentPage}, size=${size}, sort='name')}">Name</a></th>
        <th><a th:href="@{/shops(page=${currentPage}, size=${size}, sort='category')}">Category</a></th>
        <th><a th:href="@{/shops(page=${currentPage}, size=${size}, sort='address')}">Address</a></th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="shop, iterStat : ${shops}">
        <td th:text="${shop.name}"></td>
        <td th:text="${shop.category}"></td>
        <td th:text="${shop.address}"></td>
        <td>
            <div style="display: inline; margin-right: 10px;">
                <a th:href="@{/shops/{id}(id=${shop.id})}">Details</a>
            </div>
            <div style="display: inline; margin-right: 10px;">
                <a th:href="@{/shops/{id}/edit(id=${shop.id})}">Edit</a>
            </div>


            <div style="display: inline; margin-right: 10px;"
                         th:each="authority : ${authorities}">


                            <span th:if="${authority.authority == 'ROLE_USER'}">
                                 <form th:action="@{/shops/{id}/delete(id=${shop.id})}" method="get" onsubmit="return confirm('Are you sure you want to delete this shop?');" style="display: inline;">
                                    <button type="submit">Delete</button>
                                </form>
                            </span>



                            <span th:if="${authority.authority == 'ROLE_ADMIN'}">
                                 <form th:action="@{/shops/{id}/delete(id=${shop.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this shop?');" style="display: inline;">
                                    <button type="submit">Delete</button>
                                </form>
                            </span>
            </div>



        </td>
    </tr>
    </tbody>
</table>


<div th:if="${totalPages  > 0}">
    <a th:href="@{/shops(page=${currentPage - 1}, size=${size})}" th:if="${currentPage > 0}">Back</a>
    <span>Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span></span>
    <a th:href="@{/shops(page=${currentPage + 1}, size=${size})}" th:if="${currentPage < totalPages - 1}">Next</a>
</div>


<a href="/shops/add">Add New Shop</a>
</body>
</html>
