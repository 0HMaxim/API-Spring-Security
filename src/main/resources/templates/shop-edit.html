<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Shop</title>
</head>
<body>
<h1>Edit Shop</h1>


<form th:action="@{/shops/{id}/edit(id=${shop.id})}" method="post" th:object="${shop}">
    <div>
        <label for="name">Shop Name:</label>
        <input type="text" id="name" th:field="*{name}" required />
    </div>
    <div>
        <label for="address">Address:</label>
        <input type="text" id="address" th:field="*{address}" required />
    </div>
    <div>
        <label for="phone">Phone:</label>
        <input type="text" id="phone" th:field="*{phone}" required />
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required />
    </div>
    <div>
        <label for="website">Website:</label>
        <input type="url" id="website" th:field="*{website}" />
    </div>
    <div>
        <label for="category">Category:</label>
        <input type="text" id="category" th:field="*{category}" required />
    </div>
    <div>
        <label for="description">Description:</label>
        <textarea id="description" th:field="*{description}" required></textarea>
    </div>
    <div>
        <button type="submit">Save Changes</button>
        <a th:href="@{/shops}">Cancel</a>
    </div>
</form>

</body>
</html>
